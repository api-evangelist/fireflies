apis:
  - aid: fireflies:fireflies-graphql-api
    name: Fireflies GraphQL API
    description: >
      The Fireflies GraphQL API provides a single endpoint for querying and mutating all meeting data including transcripts, summaries, action items, speakers, and analytics. Developers can retrieve transcripts, manage live meetings, work with AskFred AI threads, handle bites, and access audit event logs via strongly-typed GraphQL queries and mutations.
