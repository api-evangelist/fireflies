# Query type

type Query {
  # Get current authenticated user
  user(id: String): User

  # Get all users in the workspace
  users: [User]

  # Get user groups
  user_groups(mine: Boolean): [UserGroup]

  # Get a single transcript by ID
  transcript(id: String!): Transcript

  # Get a list of transcripts with optional filtering
  transcripts(
    title: String
    date: Float
    fromDate: DateTime
    toDate: DateTime
    limit: Int
    skip: Int
    host_email: String
    organizer_email: String
    participant_email: String
    user_id: String
    mine: Boolean
    keyword: String
    scope: String
    organizers: [String!]
    participants: [String!]
    channel_id: String
  ): [Transcript]

  # Get a single bite clip by ID
  bite(id: ID!): Bite

  # Get a list of bite clips
  bites(
    mine: Boolean
    transcript_id: ID
    my_team: Boolean
    limit: Int
    skip: Int
  ): [Bite]

  # Get AI app outputs
  apps(
    app_id: String
    transcript_id: String
    skip: Float
    limit: Float
  ): AIApps

  # Get AskFred threads optionally filtered by transcript
  askfred_threads(transcript_id: String): [AskFredThread]

  # Get a single AskFred thread by ID
  askfred_thread(id: String!): AskFredThread

  # Get currently active/live meetings
  active_meetings(input: GetActiveMeetingsInput): [ActiveMeeting]

  # Get workspace channels
  channels: [Channel]

  # Get a single channel by ID
  channel(id: ID!): Channel

  # Get contacts
  contacts: [Contact]

  # Get team and user analytics
  analytics(start_time: String, end_time: String): Analytics
}

# Mutation type

type Mutation {
  # Upload an audio file for transcription
  uploadAudio(input: AudioUploadInput): AudioUploadResponse

  # Add Fireflies bot to a live meeting
  addToLiveMeeting(
    meeting_link: String!
    title: String
    meeting_password: String
    duration: Int
    language: String
    attendees: [AttendeeInput!]
  ): AddToLiveMeetingResponse

  # Delete a transcript
  deleteTranscript(id: String!): DeleteTranscriptResponse

  # Update the title of a meeting transcript
  updateMeetingTitle(input: UpdateMeetingTitleInput!): Transcript

  # Update the privacy setting of a meeting transcript
  updateMeetingPrivacy(input: UpdateMeetingPrivacyInput!): Transcript

  # Move a transcript to a channel
  updateMeetingChannel(input: UpdateMeetingChannelInput!): Transcript

  # Share a meeting with external users via email
  shareMeeting(input: ShareMeetingInput!): ShareMeetingResponse

  # Revoke shared access to a meeting
  revokeSharedMeetingAccess(input: RevokeSharedMeetingAccessInput!): RevokeSharedMeetingAccessResponse

  # Create a bite clip from a transcript
  createBite(
    transcript_Id: ID!
    name: String
    start_time: Float!
    end_time: Float!
    media_type: String
    privacies: [BitePrivacy!]
    summary: String
  ): CreateBiteResponse

  # Set a user's role in the workspace
  setUserRole(user_id: String!, role: Role!): User

  # Create a new AskFred AI thread
  createAskFredThread(input: CreateAskFredThreadInput!): AskFredThreadResult

  # Continue an existing AskFred AI thread
  continueAskFredThread(input: ContinueAskFredThreadInput!): AskFredThreadResult

  # Delete an AskFred AI thread
  deleteAskFredThread(id: String!): AskFredThread
}
